<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura — Социальная сеть</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --bg3: #1a1a26;
            --bg4: #222232;
            --accent: #7c5cfc;
            --accent2: #a78bfa;
            --accent3: #f472b6;
            --text: #f0eeff;
            --text2: #a09ab8;
            --text3: #6b6580;
            --border: rgba(124, 92, 252, 0.18);
            --border2: rgba(255, 255, 255, 0.07);
            --green: #22d3a5;
            --red: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden
        }

        h1,
        h2,
        h3,
        .logo {
            font-family: 'Syne', sans-serif
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* AUTH */
        #auth {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg);
            position: relative;
            overflow: hidden
        }

        #auth::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.12) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            pointer-events: none
        }

        #auth::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.08) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
            pointer-events: none
        }

        .auth-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            position: relative;
            z-index: 1
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px
        }

        .auth-logo .logo-mark {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px
        }

        .auth-logo p {
            font-size: 13px;
            color: var(--text2);
            margin-top: 4px
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg3);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px
        }

        .auth-tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: none;
            color: var(--text2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            transition: all .2s
        }

        .auth-tab.active {
            background: var(--accent);
            color: #fff
        }

        .auth-field {
            margin-bottom: 16px
        }

        .auth-field label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 6px;
            letter-spacing: .5px;
            text-transform: uppercase
        }

        .auth-field input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s
        }

        .auth-field input:focus {
            border-color: var(--accent)
        }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #9333ea);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s;
            letter-spacing: .3px
        }

        .auth-btn:hover {
            opacity: .9
        }

        .auth-err {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 12px;
            display: none
        }

        .demo-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text3)
        }

        .demo-hint span {
            color: var(--accent2);
            cursor: pointer;
            text-decoration: underline
        }

        /* MAIN LAYOUT */
        #main {
            display: none;
            height: 100vh;
            overflow: hidden
        }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr 280px;
            height: 100vh
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            padding: 24px 16px
        }

        .sidebar .logo-mark {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            padding: 0 8px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text2);
            transition: all .2s;
            margin-bottom: 4px
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .nav-item.active {
            background: rgba(124, 92, 252, 0.15);
            color: var(--accent2)
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0
        }

        .sidebar-bottom {
            margin-top: auto
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s
        }

        .user-pill:hover {
            background: var(--bg3)
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0
        }

        .avatar.sm {
            width: 26px;
            height: 26px;
            font-size: 11px
        }

        .avatar.lg {
            width: 44px;
            height: 44px;
            font-size: 16px
        }

        .user-pill .uname {
            font-size: 13px;
            font-weight: 500
        }

        .user-pill .uhint {
            font-size: 11px;
            color: var(--text3)
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--red);
            margin-top: 4px;
            transition: background .2s
        }

        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.08)
        }

        /* FEED */
        .feed-area {
            overflow-y: auto;
            background: var(--bg);
            height: 100%
        }

        .feed-area::-webkit-scrollbar {
            width: 4px
        }

        .feed-area::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 2px
        }

        .feed-header {
            padding: 20px 28px 16px;
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10
        }

        .feed-header h2 {
            font-size: 18px;
            font-weight: 700
        }

        .create-post-btn {
            padding: 8px 16px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'DM Sans', sans-serif;
            transition: opacity .2s
        }

        .create-post-btn:hover {
            opacity: .85
        }

        .stories {
            display: flex;
            gap: 14px;
            padding: 18px 28px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border2)
        }

        .stories::-webkit-scrollbar {
            display: none
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0
        }

        .story-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            transition: transform .2s
        }

        .story-ring:hover {
            transform: scale(1.05)
        }

        .story-ring .story-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff
        }

        .story-label {
            font-size: 11px;
            color: var(--text2);
            max-width: 52px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .feed-posts {
            padding: 0 28px 28px
        }

        .post-card {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 18px;
            margin-top: 20px;
            overflow: hidden;
            transition: border-color .2s
        }

        .post-card:hover {
            border-color: var(--border)
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px
        }

        .post-meta .uname {
            font-size: 13px;
            font-weight: 500
        }

        .post-meta .time {
            font-size: 11px;
            color: var(--text3)
        }

        .post-img {
            width: 100%;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: linear-gradient(135deg, var(--bg3), var(--bg4))
        }

        .post-body {
            padding: 14px 16px
        }

        .post-caption {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 12px
        }

        .post-actions {
            display: flex;
            gap: 4px
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 8px;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
            font-family: 'DM Sans', sans-serif
        }

        .action-btn:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .action-btn.liked {
            color: var(--accent3)
        }

        .action-btn svg {
            width: 15px;
            height: 15px
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 420px;
            padding: 28px
        }

        .modal h3 {
            font-size: 17px;
            margin-bottom: 20px;
            font-family: 'Syne', sans-serif
        }

        .modal textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            resize: none;
            height: 100px;
            transition: border-color .2s
        }

        .modal textarea:focus {
            border-color: var(--accent)
        }

        .emoji-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0
        }

        .emoji-opt {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .emoji-opt:hover,
        .emoji-opt.sel {
            background: rgba(124, 92, 252, 0.2);
            border-color: var(--accent)
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end
        }

        .btn-ghost {
            padding: 9px 18px;
            background: none;
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--text2);
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all .2s
        }

        .btn-ghost:hover {
            border-color: var(--text2);
            color: var(--text)
        }

        .btn-primary {
            padding: 9px 18px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity .2s
        }

        .btn-primary:hover {
            opacity: .85
        }

        /* CHAT PANEL */
        .chat-panel {
            background: var(--bg2);
            border-left: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .chat-header {
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--border2);
            flex-shrink: 0
        }

        .chat-header h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'Syne', sans-serif
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .chat-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s
        }

        .chat-user:hover {
            background: var(--bg3)
        }

        .chat-user.active {
            background: rgba(124, 92, 252, 0.12)
        }

        .chat-user .uname {
            font-size: 13px;
            font-weight: 500
        }

        .chat-user .preview {
            font-size: 11px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-left: auto;
            flex-shrink: 0
        }

        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0
        }

        .chat-active-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            gap: 9px;
            flex-shrink: 0
        }

        .chat-active-header .uname {
            font-size: 13px;
            font-weight: 500
        }

        .chat-active-header .status {
            font-size: 11px;
            color: var(--green)
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0
        }

        .messages::-webkit-scrollbar {
            width: 3px
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 2px
        }

        .msg {
            max-width: 80%;
            padding: 9px 13px;
            border-radius: 14px;
            font-size: 12.5px;
            line-height: 1.5;
            word-break: break-word
        }

        .msg.mine {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px
        }

        .msg.theirs {
            background: var(--bg3);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px
        }

        .msg-time {
            font-size: 10px;
            opacity: .6;
            margin-top: 3px;
            text-align: right
        }

        .chat-input-area {
            padding: 12px 14px;
            border-top: 1px solid var(--border2);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0
        }

        .chat-input-area input {
            flex: 1;
            padding: 9px 13px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s
        }

        .chat-input-area input:focus {
            border-color: var(--accent)
        }

        .send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity .2s
        }

        .send-btn:hover {
            opacity: .85
        }

        .chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text3);
            font-size: 13px
        }

        .encrypted-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--green);
            padding: 4px 8px;
            background: rgba(34, 211, 165, 0.08);
            border-radius: 20px
        }

        /* EXPLORE */
        #explore-view {
            display: none;
            height: 100%;
            overflow-y: auto;
            background: var(--bg)
        }

        .explore-header {
            padding: 20px 28px 16px;
            border-bottom: 1px solid var(--border2);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10
        }

        .explore-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px
        }

        .search-input-wrap {
            position: relative
        }

        .search-input-wrap input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 12px;
            color: var(--text);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s
        }

        .search-input-wrap input:focus {
            border-color: var(--accent)
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3)
        }

        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            padding: 16px 28px
        }

        .explore-tile {
            aspect-ratio: 1;
            background: var(--bg3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: opacity .2s
        }

        .explore-tile:hover {
            opacity: .75
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- ══ AUTH ══ -->
        <div id="auth">
            <div class="auth-box">
                <div class="auth-logo">
                    <div class="logo-mark">✦ Aura</div>
                    <p>Общайся. Делись. Безопасно.</p>
                </div>
                <div id="auth-err" class="auth-err"></div>
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
                    <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
                </div>

                <!-- Login -->
                <div id="login-form">
                    <div class="auth-field">
                        <label>Логин</label>
                        <input id="l-user" type="text" placeholder="username" />
                    </div>
                    <div class="auth-field">
                        <label>Пароль</label>
                        <input id="l-pass" type="password" placeholder="••••••••"
                            onkeydown="if(event.key==='Enter')doLogin()" />
                    </div>
                    <button class="auth-btn" onclick="doLogin()">Войти</button>
                    <div class="demo-hint">
                        Демо: <span onclick="fillDemo('alex')">alex</span> /
                        <span onclick="fillDemo('mila')">mila</span> /
                        <span onclick="fillDemo('dima')">dima</span> — пароль: 123
                    </div>
                </div>

                <!-- Register -->
                <div id="register-form" style="display:none">
                    <div class="auth-field">
                        <label>Имя</label>
                        <input id="r-name" type="text" placeholder="Твоё имя" />
                    </div>
                    <div class="auth-field">
                        <label>Логин</label>
                        <input id="r-user" type="text" placeholder="username (буквы, цифры, _)" />
                    </div>
                    <div class="auth-field">
                        <label>Пароль</label>
                        <input id="r-pass" type="password" placeholder="Минимум 6 символов"
                            onkeydown="if(event.key==='Enter')doRegister()" />
                    </div>
                    <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
                </div>
            </div>
        </div>

        <!-- ══ MAIN APP ══ -->
        <div id="main">
            <div class="layout">

                <!-- Sidebar -->
                <div class="sidebar">
                    <div class="logo-mark">✦ Aura</div>
                    <div class="nav-item active" id="nav-feed" onclick="showView('feed',this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1" />
                            <rect x="14" y="3" width="7" height="7" rx="1" />
                            <rect x="3" y="14" width="7" height="7" rx="1" />
                            <rect x="14" y="14" width="7" height="7" rx="1" />
                        </svg>
                        Лента
                    </div>
                    <div class="nav-item" id="nav-explore" onclick="showView('explore',this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        Поиск
                    </div>
                    <div class="nav-item" onclick="openPost()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 8v8M8 12h8" />
                        </svg>
                        Публикация
                    </div>
                    <div class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                        Активность
                    </div>
                    <div class="sidebar-bottom">
                        <div class="user-pill">
                            <div class="avatar" id="sidebar-avatar">A</div>
                            <div>
                                <div class="uname" id="sidebar-uname">—</div>
                                <div class="uhint">Мой профиль</div>
                            </div>
                        </div>
                        <div class="logout-btn" onclick="doLogout()">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" />
                            </svg>
                            Выйти
                        </div>
                    </div>
                </div>

                <!-- Center -->
                <div style="overflow:hidden;position:relative;display:flex;flex-direction:column">

                    <!-- Feed -->
                    <div class="feed-area" id="feed-view">
                        <div class="feed-header">
                            <h2>Лента</h2>
                            <button class="create-post-btn" onclick="openPost()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M12 5v14M5 12h14" />
                                </svg>
                                Создать
                            </button>
                        </div>
                        <div class="stories" id="stories-row"></div>
                        <div class="feed-posts" id="posts-container"></div>
                    </div>

                    <!-- Explore -->
                    <div id="explore-view">
                        <div class="explore-header">
                            <h2>Поиск</h2>
                            <div class="search-input-wrap">
                                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8" />
                                    <path d="m21 21-4.35-4.35" />
                                </svg>
                                <input type="text" placeholder="Поиск пользователей и постов..." />
                            </div>
                        </div>
                        <div class="explore-grid" id="explore-grid"></div>
                    </div>
                </div>

                <!-- Chat Panel -->
                <div class="chat-panel">
                    <div class="chat-header">
                        <h3>Сообщения</h3>
                        <div class="chat-list" id="chat-user-list"></div>
                    </div>
                    <div class="chat-window">
                        <div id="chat-active"
                            style="display:none;flex:1;flex-direction:column;overflow:hidden;height:100%">
                            <div class="chat-active-header">
                                <div class="avatar sm" id="chat-av">M</div>
                                <div>
                                    <div class="uname" id="chat-with-name">—</div>
                                    <div class="status">● В сети</div>
                                </div>
                                <div class="encrypted-badge" style="margin-left:auto">
                                    <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
                                    </svg>
                                    E2E шифрование
                                </div>
                            </div>
                            <div class="messages" id="messages-box"></div>
                            <div class="chat-input-area">
                                <input id="msg-input" type="text" placeholder="Написать сообщение..."
                                    onkeydown="if(event.key==='Enter')sendMsg()" />
                                <button class="send-btn" onclick="sendMsg()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff"
                                        stroke-width="2.5">
                                        <line x1="22" y1="2" x2="11" y2="13" />
                                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="chat-placeholder" id="chat-placeholder">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                            Выбери чат слева
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div class="modal-overlay" id="post-modal">
        <div class="modal">
            <h3>Новая публикация</h3>
            <div class="emoji-picker">
                <div class="emoji-opt sel" data-e="🌆" onclick="selEmoji(this)">🌆</div>
                <div class="emoji-opt" data-e="🌊" onclick="selEmoji(this)">🌊</div>
                <div class="emoji-opt" data-e="🎨" onclick="selEmoji(this)">🎨</div>
                <div class="emoji-opt" data-e="🏔️" onclick="selEmoji(this)">🏔️</div>
                <div class="emoji-opt" data-e="🍜" onclick="selEmoji(this)">🍜</div>
                <div class="emoji-opt" data-e="🎸" onclick="selEmoji(this)">🎸</div>
                <div class="emoji-opt" data-e="🌸" onclick="selEmoji(this)">🌸</div>
                <div class="emoji-opt" data-e="🚀" onclick="selEmoji(this)">🚀</div>
            </div>
            <textarea id="post-caption" placeholder="Что у тебя нового?"></textarea>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closePost()">Отмена</button>
                <button class="btn-primary" onclick="submitPost()">Опубликовать</button>
            </div>
        </div>
    </div>

    <script>
        // ══ DATA ══
        const USERS = {
            alex: { pass: '123', name: 'Алекс', color: '#7c5cfc' },
            mila: { pass: '123', name: 'Мила', color: '#f472b6' },
            dima: { pass: '123', name: 'Дима', color: '#22d3a5' }
        };

        let state = {
            me: null,
            openChat: null,
            selectedEmoji: '🌆',
            posts: [
                { id: 1, user: 'mila', emoji: '🌆', caption: 'Закат над городом 🌇 Такие моменты хочется сохранить навсегда', likes: [], time: '2 мин. назад' },
                { id: 2, user: 'dima', emoji: '🏔️', caption: 'Выходные в горах. Воздух чистый, голова ясная. Советую всем!', likes: ['alex'], time: '15 мин. назад' },
                { id: 3, user: 'mila', emoji: '🍜', caption: 'Приготовила рамен с нуля — получилось идеально 🍜✨', likes: ['dima'], time: '1 ч. назад' },
                { id: 4, user: 'alex', emoji: '🎸', caption: 'Новая мелодия написана. Музыка — лучший способ выразить всё что внутри', likes: ['mila', 'dima'], time: '3 ч. назад' }
            ],
            chats: {
                alex: {
                    mila: [
                        { from: 'mila', text: 'Привет! Как дела?', t: '10:30' },
                        { from: 'alex', text: 'Отлично, спасибо! 😊', t: '10:31' }
                    ],
                    dima: [{ from: 'dima', text: 'Привет, как выходные?', t: 'вчера' }]
                },
                mila: {
                    alex: [
                        { from: 'mila', text: 'Привет! Как дела?', t: '10:30' },
                        { from: 'alex', text: 'Отлично, спасибо! 😊', t: '10:31' }
                    ],
                    dima: [{ from: 'mila', text: 'Привет! Видела твой пост про горы!', t: '12:00' }]
                },
                dima: {
                    alex: [{ from: 'dima', text: 'Привет, как выходные?', t: 'вчера' }],
                    mila: [
                        { from: 'mila', text: 'Привет! Видела твой пост про горы!', t: '12:00' },
                        { from: 'dima', text: 'Да, было круто! Приедешь?', t: '12:05' }
                    ]
                }
            }
        };

        // ══ AUTH ══
        function fillDemo(u) {
            document.getElementById('l-user').value = u;
            document.getElementById('l-pass').value = '123';
        }

        function switchTab(t) {
            const isLogin = t === 'login';
            document.querySelectorAll('.auth-tab').forEach((b, i) => b.classList.toggle('active', isLogin ? i === 0 : i === 1));
            document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
            document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-err').style.display = 'none';
        }

        function showErr(msg) {
            const e = document.getElementById('auth-err');
            e.textContent = msg;
            e.style.display = 'block';
        }

        function doLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if (!u || !p) { showErr('Введи логин и пароль'); return; }
            const usr = USERS[u];
            if (!usr) { showErr('Пользователь не найден'); return; }
            if (usr.pass !== p) { showErr('Неверный пароль'); return; }
            loginAs(u);
        }

        function doRegister() {
            const name = document.getElementById('r-name').value.trim();
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const p = document.getElementById('r-pass').value;
            if (!name || !u || !p) { showErr('Заполни все поля'); return; }
            if (p.length < 6) { showErr('Пароль минимум 6 символов'); return; }
            if (USERS[u]) { showErr('Такой логин уже занят'); return; }
            if (!/^[a-z0-9_]+$/.test(u)) { showErr('Логин: только буквы, цифры, _'); return; }

            const palette = ['#7c5cfc', '#f472b6', '#22d3a5', '#f59e0b', '#3b82f6', '#ec4899'];
            USERS[u] = { pass: p, name, color: palette[Object.keys(USERS).length % palette.length] };
            state.chats[u] = {};
            Object.keys(USERS).forEach(ou => {
                if (ou !== u) {
                    state.chats[u][ou] = [];
                    if (!state.chats[ou]) state.chats[ou] = {};
                    state.chats[ou][u] = [];
                }
            });
            loginAs(u);
        }

        function loginAs(u) {
            state.me = u;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            const av = document.getElementById('sidebar-avatar');
            av.textContent = u[0].toUpperCase();
            av.style.background = USERS[u].color;
            document.getElementById('sidebar-uname').textContent = u;
            renderAll();
        }

        function doLogout() {
            state.me = null; state.openChat = null;
            document.getElementById('auth').style.display = 'flex';
            document.getElementById('main').style.display = 'none';
            document.getElementById('l-user').value = '';
            document.getElementById('l-pass').value = '';
            document.getElementById('auth-err').style.display = 'none';
            showView('feed', document.getElementById('nav-feed'));
        }

        // ══ HELPERS ══
        function gi(u) { return (u || '?')[0].toUpperCase(); }
        function gc(u) { return USERS[u] ? USERS[u].color : '#7c5cfc'; }
        function nowT() { const n = new Date(); return n.getHours() + ':' + (n.getMinutes() < 10 ? '0' : '') + n.getMinutes(); }

        // ══ RENDER ══
        function renderAll() {
            renderStories(); renderPosts(); renderChatList(); renderExplore();
        }

        function renderStories() {
            const row = document.getElementById('stories-row');
            const others = Object.keys(USERS).filter(u => u !== state.me);
            row.innerHTML = others.map(u =>
                `<div class="story-item" onclick="openChatWith('${u}')">
      <div class="story-ring">
        <div class="story-inner" style="background:${gc(u)}">${gi(u)}</div>
      </div>
      <div class="story-label">${u}</div>
    </div>`
            ).join('');
        }

        function renderPosts() {
            const c = document.getElementById('posts-container');
            c.innerHTML = state.posts.slice().reverse().map(p => {
                const liked = p.likes.includes(state.me);
                const canLike = p.user !== state.me;
                return `<div class="post-card">
      <div class="post-header">
        <div class="avatar" style="background:${gc(p.user)}">${gi(p.user)}</div>
        <div class="post-meta">
          <div class="uname">${p.user}</div>
          <div class="time">${p.time}</div>
        </div>
      </div>
      <div class="post-img">${p.emoji}</div>
      <div class="post-body">
        <div class="post-caption">${p.caption}</div>
        <div class="post-actions">
          <button class="action-btn ${liked ? 'liked' : ''}" onclick="${canLike ? 'toggleLike(' + p.id + ')' : ''}">
            <svg viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${p.likes.length}
          </button>
          ${p.user !== state.me ? `<button class="action-btn" onclick="openChatWith('${p.user}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Написать
          </button>` : ''}
        </div>
      </div>
    </div>`;
            }).join('');
        }

        function toggleLike(id) {
            const p = state.posts.find(x => x.id === id);
            if (!p) return;
            const i = p.likes.indexOf(state.me);
            if (i > -1) p.likes.splice(i, 1); else p.likes.push(state.me);
            renderPosts();
        }

        function renderChatList() {
            const list = document.getElementById('chat-user-list');
            const others = Object.keys(USERS).filter(u => u !== state.me);
            list.innerHTML = others.map(u => {
                const msgs = (state.chats[state.me] || {})[u] || [];
                const last = msgs[msgs.length - 1];
                return `<div class="chat-user ${state.openChat === u ? 'active' : ''}" onclick="openChatWith('${u}')">
      <div class="avatar sm" style="background:${gc(u)}">${gi(u)}</div>
      <div style="flex:1;min-width:0">
        <div class="uname">${u}</div>
        <div class="preview">${last ? last.text : 'Начни диалог'}</div>
      </div>
      <div class="online-dot"></div>
    </div>`;
            }).join('');
        }

        function openChatWith(u) {
            if (!u || u === state.me) return;
            state.openChat = u;
            const av = document.getElementById('chat-av');
            av.textContent = gi(u);
            av.style.background = gc(u);
            document.getElementById('chat-with-name').textContent = u;
            document.getElementById('chat-placeholder').style.display = 'none';
            const ca = document.getElementById('chat-active');
            ca.style.display = 'flex';
            ca.style.flexDirection = 'column';
            ca.style.overflow = 'hidden';
            ca.style.height = '100%';
            renderMessages();
            renderChatList();
            document.getElementById('msg-input').focus();
        }

        function renderMessages() {
            const box = document.getElementById('messages-box');
            const msgs = (state.chats[state.me] || {})[state.openChat] || [];
            box.innerHTML = msgs.map(m =>
                `<div class="msg ${m.from === state.me ? 'mine' : 'theirs'}">${m.text}<div class="msg-time">${m.t}</div></div>`
            ).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if (!txt || !state.openChat) return;
            const msg = { from: state.me, text: txt, t: nowT() };
            if (!state.chats[state.me]) state.chats[state.me] = {};
            if (!state.chats[state.me][state.openChat]) state.chats[state.me][state.openChat] = [];
            state.chats[state.me][state.openChat].push(msg);
            if (!state.chats[state.openChat]) state.chats[state.openChat] = {};
            if (!state.chats[state.openChat][state.me]) state.chats[state.openChat][state.me] = [];
            state.chats[state.openChat][state.me].push({ ...msg });
            inp.value = '';
            renderMessages();
            renderChatList();
            setTimeout(() => autoReply(state.openChat), 900 + Math.random() * 1500);
        }

        function autoReply(from) {
            if (!state.me || !state.chats[state.me] || !state.chats[state.me][from]) return;
            const replies = ['👍', 'Интересно!', 'Согласен!', 'Хорошо, понял', 'Окей 😊', 'Спасибо!', 'Отлично!', 'Понял!', '🔥'];
            const txt = replies[Math.floor(Math.random() * replies.length)];
            const msg = { from, text: txt, t: nowT() };
            state.chats[state.me][from].push(msg);
            state.chats[from][state.me].push({ ...msg });
            if (state.openChat === from) renderMessages();
            renderChatList();
        }

        // ══ POST MODAL ══
        function openPost() { document.getElementById('post-modal').classList.add('open'); }
        function closePost() { document.getElementById('post-modal').classList.remove('open'); }

        function selEmoji(el) {
            document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('sel'));
            el.classList.add('sel');
            state.selectedEmoji = el.dataset.e;
        }

        function submitPost() {
            const cap = document.getElementById('post-caption').value.trim();
            if (!cap) return;
            state.posts.push({ id: Date.now(), user: state.me, emoji: state.selectedEmoji, caption: cap, likes: [], time: 'Только что' });
            document.getElementById('post-caption').value = '';
            closePost();
            renderPosts();
        }

        // ══ NAVIGATION ══
        function showView(v, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (el) el.classList.add('active');
            document.getElementById('feed-view').style.display = v === 'feed' ? 'block' : 'none';
            document.getElementById('explore-view').style.display = v === 'explore' ? 'block' : 'none';
        }

        function renderExplore() {
            const emojis = ['🌆', '🏔️', '🌊', '🎨', '🍜', '🎸', '🌸', '🚀', '🌅', '🎭', '🦋', '🏙️', '🌺', '🎪', '🦅', '🍕', '🎯', '🌃', '🎠', '🌿', '🏄', '🎡'];
            document.getElementById('explore-grid').innerHTML = emojis.map(e =>
                `<div class="explore-tile">${e}</div>`
            ).join('');
        }

        // Close modal on overlay click
        document.getElementById('post-modal').addEventListener('click', function (e) {
            if (e.target === this) closePost();
        });
    </script>
</body>

</html>
